name: Sync Bilibili Dynamics



on:

  # 已禁用自动同步 (B站 -412 风控封禁 GitHub Actions IP)

  # schedule:

  #   - cron: '*/30 * * * *'

  workflow_dispatch:

    # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Bilibili Dynamics
        env:
          BILIBILI_UID: ${{ secrets.BILIBILI_UID }}
          BILI_JCT: ${{ secrets.BILI_JCT }}
          BUVID3: ${{ secrets.BUVID3 }}
          BUVID4: ${{ secrets.BUVID4 }}
          BILIBILI_SESSDATA: ${{ secrets.BILIBILI_SESSDATA }}
        run: npm run sync-dynamics

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/dynamics.json public/images/dynamics/
          git commit -m "chore: auto-sync bilibili dynamics $(date '+%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
